name: Deploy Test

on:
  push:
    branches:
      - test
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_TAG: test
  DEPLOY_PATH: /home/btcfoxman/docker/any-auto-register
  DEPLOY_SERVICE: app

jobs:
  build-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=test-${{ github.sha }}
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository }}:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull and Restart on LAN Runner
    needs: build-image
    runs-on: [self-hosted, linux, x64, any-auto-register]
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${IMAGE_REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Pull image and restart service
        run: |
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
          IMAGE_NAMESPACE="${IMAGE_NAMESPACE}" \
          IMAGE_NAME="${IMAGE_NAME}" \
          IMAGE_TAG="${IMAGE_TAG}" \
          docker compose pull "${DEPLOY_SERVICE}"
          IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
          IMAGE_NAMESPACE="${IMAGE_NAMESPACE}" \
          IMAGE_NAME="${IMAGE_NAME}" \
          IMAGE_TAG="${IMAGE_TAG}" \
          docker compose up -d "${DEPLOY_SERVICE}"
          docker image prune -f
